{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>{{ sheet.name }} - Niron Smart Print Builder</title>

    {% now "U" as cache_bust %}

    <style>
:root {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #2f241b;
  background: #efe7c1;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
}

* {
  box-sizing: border-box;
}

html,
body,
#root {
  width: 100%;
  height: 100%;
  margin: 0;
}

button,
input,
select {
  font: inherit;
}

button {
  cursor: pointer;
}


:root {
  --cream: #f4edc5;
  --cream-soft: #fffaf0;
  --brown: #8b6848;
  --brown-dark: #563a27;
  --line: #decba4;
  --ink: #2f241b;
  --muted: #776553;
  --green: #285c3b;
  --danger: #8a2e26;
  --shadow: 0 16px 44px rgba(70, 45, 25, 0.13);
}

.builder-app {
  min-height: 100%;
  display: grid;
  grid-template-rows: 62px minmax(0, 1fr) 34px;
  background: linear-gradient(180deg, #f7f1d3, var(--cream));
  overflow: hidden;
}

.topbar {
  position: sticky;
  top: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 0 18px;
  color: white;
  background: linear-gradient(135deg, #7e5c3e, #9b7450);
  box-shadow: 0 5px 18px rgba(50, 30, 15, 0.18);
  z-index: 120;
}

.brand-block {
  display: flex;
  align-items: center;
  gap: 11px;
  min-width: 0;
}

.brand-logo {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  border-radius: 12px;
  color: var(--brown);
  background: var(--cream);
  font-weight: 950;
}

.brand-block strong,
.brand-block span,
.topbar-summary b,
.topbar-summary span {
  display: block;
}

.brand-block strong {
  font-size: 15px;
  letter-spacing: 0.1px;
}

.brand-block span,
.topbar-summary span {
  margin-top: 2px;
  font-size: 11px;
  opacity: 0.86;
}

.topbar-summary {
  min-width: 220px;
  text-align: right;
}

.workspace {
  min-height: 0;
  height: calc(100vh - 62px - 34px);
  display: grid;
  grid-template-columns: 245px minmax(360px, 1fr) 255px;
  gap: 10px;
  padding: 10px;
}

.sidebar {
  min-height: 0;
  max-height: calc(100vh - 62px - 34px - 20px);
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: rgba(255, 253, 247, 0.93);
  box-shadow: var(--shadow);
}

.panel-section {
  padding: 13px;
  border-bottom: 1px solid #eadfc6;
}

.panel-section:last-child {
  border-bottom: 0;
}

.panel-section h3 {
  margin: 0 0 11px;
  color: var(--brown-dark);
  font-size: 13px;
}

.panel-section label {
  display: block;
  margin: 8px 0 5px;
  color: #594838;
  font-size: 11px;
  font-weight: 800;
}

.panel-section input[type="number"],
.panel-section select {
  width: 100%;
  min-height: 36px;
  padding: 7px 9px;
  border: 1px solid #d7c29b;
  border-radius: 9px;
  color: var(--ink);
  background: white;
  outline: none;
}

.panel-section input:focus,
.panel-section select:focus {
  border-color: var(--brown);
  box-shadow: 0 0 0 3px rgba(139, 104, 72, 0.12);
}

.file-input {
  display: none;
}

.panel-section button,
.canvas-toolbar button,
.icon-button {
  width: 100%;
  min-height: 36px;
  margin: 0 0 7px;
  padding: 8px 10px;
  border: 1px solid transparent;
  border-radius: 10px;
  color: white;
  background: var(--brown);
  font-size: 12px;
  font-weight: 850;
  transition: 0.16s ease;
}

.panel-section button:hover:not(:disabled),
.canvas-toolbar button:hover:not(:disabled) {
  transform: translateY(-1px);
  filter: brightness(1.04);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.45;
}

.primary-button {
  background: linear-gradient(135deg, #9b744e, #755338) !important;
}

.secondary-button {
  color: #493728 !important;
  border-color: #d8c39c !important;
  background: #f8f0cf !important;
}

.dark-button {
  background: #2d2119 !important;
}

.green-button {
  background: var(--green) !important;
}

.danger-button {
  background: var(--danger) !important;
}

.check-row {
  display: flex !important;
  align-items: flex-start;
  gap: 7px;
  line-height: 1.35;
  cursor: pointer;
}

.check-row input {
  width: 15px;
  height: 15px;
  margin: 1px 0 0;
  accent-color: var(--brown);
  flex: 0 0 auto;
}

.compact-section {
  padding-bottom: 11px;
}

.metric-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}

.metric-card {
  min-width: 0;
  padding: 8px;
  border: 1px solid #eadbbe;
  border-radius: 10px;
  background: #fff;
}

.metric-card span,
.metric-card strong {
  display: block;
}

.metric-card span {
  color: var(--muted);
  font-size: 9px;
}

.metric-card strong {
  margin-top: 3px;
  color: var(--brown-dark);
  font-size: 12px;
}

.canvas-column {
  position: relative;
  min-width: 0;
  min-height: 0;
  display: grid;
  grid-template-rows: 42px minmax(0, 1fr);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  background: rgba(246, 239, 207, 0.74);
  box-shadow: var(--shadow);
}

.canvas-toolbar {
  position: sticky;
  top: 0;
  z-index: 35;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 6px 9px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 252, 241, 0.96);
}

.tool-group {
  display: flex;
  align-items: center;
  gap: 5px;
}

.canvas-toolbar button {
  width: auto;
  min-width: 30px;
  min-height: 28px;
  margin: 0;
  padding: 5px 9px;
  color: #463525;
  border-color: #d7c49f;
  background: #fff8df;
}

.tool-group span {
  min-width: 48px;
  text-align: center;
  color: var(--brown-dark);
  font-size: 11px;
  font-weight: 850;
}

.canvas-help {
  overflow: hidden;
  color: var(--muted);
  font-size: 10px;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.canvas-scroll {
  min-height: 0;
  overflow: auto;
  overscroll-behavior: contain;
  padding: 24px;
  background-color: #efe7c8;
  background-image:
    linear-gradient(45deg, rgba(98, 74, 49, 0.05) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(98, 74, 49, 0.05) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(98, 74, 49, 0.05) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(98, 74, 49, 0.05) 75%);
  background-position: 0 0, 0 10px, 10px -10px, -10px 0;
  background-size: 20px 20px;
}

.print-sheet {
  position: relative;
  margin: 0 auto 30px;
  overflow: hidden;
  border: 2px solid #8b6848;
  border-radius: 7px;
  background-color: white;
  background-image:
    linear-gradient(to right, rgba(139, 104, 72, 0.05) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(139, 104, 72, 0.05) 1px, transparent 1px);
  box-shadow: 0 16px 45px rgba(63, 39, 21, 0.18);
}

.safe-margin {
  position: absolute;
  z-index: 1;
  border: 1px dashed rgba(139, 104, 72, 0.32);
  pointer-events: none;
}

.empty-sheet {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 30px;
  color: var(--muted);
  text-align: center;
  font-size: 13px;
  font-weight: 750;
}

.sheet-item {
  border: 1px dashed rgba(111, 76, 46, 0.6);
  border-radius: 4px;
  background: transparent;
  cursor: move;
}

.sheet-item:not(.selected) {
  border-color: transparent;
}

.sheet-item.selected {
  border: 2px solid #111827;
  box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.14);
}

.image-frame {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.image-frame img {
  position: absolute;
  left: 50%;
  top: 50%;
  object-fit: contain;
  user-select: none;
  pointer-events: none;
  transform-origin: center;
}

.selected-label {
  position: absolute;
  top: 4px;
  right: 4px;
  padding: 3px 5px;
  border-radius: 5px;
  color: white;
  background: #111827;
  font-size: 8px;
  font-weight: 900;
  pointer-events: none;
}

.selected-name {
  overflow: hidden;
  margin-bottom: 9px;
  padding: 8px;
  border-radius: 9px;
  color: #543b28;
  background: #f5e9c8;
  font-size: 10px;
  font-weight: 800;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.muted-text {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.5;
}

.danger-section {
  margin-top: auto;
}



.drop-import-overlay {
  position: absolute;
  inset: 0;
  z-index: 90;
  display: grid;
  place-items: center;
  pointer-events: none;
  background: rgba(41, 28, 17, 0.18);
  backdrop-filter: blur(2px);
}

.drop-import-card {
  min-width: 360px;
  max-width: min(90%, 580px);
  padding: 22px 28px;
  border: 2px dashed rgba(139, 104, 72, 0.9);
  border-radius: 18px;
  color: #fffaf0;
  background: rgba(75, 52, 33, 0.88);
  text-align: center;
  box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
}

.drop-import-card strong,
.drop-import-card span {
  display: block;
}

.drop-import-card strong {
  font-size: 20px;
  font-weight: 900;
}

.drop-import-card span {
  margin-top: 8px;
  font-size: 12px;
  opacity: 0.92;
}

.left-sidebar,
.right-sidebar {
  position: sticky;
  top: 0;
}

.zoom-shortcut-hint {
  min-width: 0;
  margin-left: 6px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 800;
  white-space: nowrap;
}

.editing-mode-label {
  padding: 6px 10px;
  border-radius: 999px;
  color: #fff;
  background: #433126;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.statusbar {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 14px;
  color: #5e4a38;
  border-top: 1px solid #ddcba8;
  background: rgba(255, 250, 232, 0.95);
  font-size: 11px;
  font-weight: 750;
}

.ready-dot,
.busy-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.ready-dot {
  background: #30804c;
}

.busy-dot {
  background: #b87924;
  animation: pulse 0.8s infinite alternate;
}

@keyframes pulse {
  to {
    opacity: 0.35;
  }
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: grid;
  place-items: center;
  padding: 18px;
  background: rgba(23, 16, 11, 0.72);
}

.wand-dialog {
  width: min(1180px, 96vw);
  height: min(820px, 94vh);
  display: grid;
  grid-template-rows: 58px minmax(0, 1fr);
  overflow: hidden;
  border: 1px solid #d8c39d;
  border-radius: 17px;
  background: #fffaf0;
  box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
}

.wand-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 9px 13px;
  color: white;
  background: #6f4d33;
}

.wand-header strong,
.wand-header span {
  display: block;
}

.wand-header strong {
  font-size: 14px;
}

.wand-header span {
  margin-top: 3px;
  font-size: 10px;
  opacity: 0.84;
}

.icon-button {
  width: 34px !important;
  height: 34px;
  min-height: 34px !important;
  margin: 0 !important;
  padding: 0 !important;
  border-color: rgba(255, 255, 255, 0.28) !important;
  color: white !important;
  background: rgba(255, 255, 255, 0.12) !important;
  font-size: 22px !important;
}

.wand-body {
  min-height: 0;
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
}

.wand-controls {
  overflow: auto;
  padding: 14px;
  border-right: 1px solid #e4d2ae;
}

.wand-controls label {
  display: block;
  margin: 10px 0 5px;
  color: #554331;
  font-size: 11px;
  font-weight: 800;
}

.wand-controls input[type="range"] {
  width: 100%;
  accent-color: var(--brown);
}

.wand-controls button {
  width: 100%;
  min-height: 36px;
  margin-top: 8px;
  border: 0;
  border-radius: 9px;
  color: white;
  background: var(--brown);
  font-size: 11px;
  font-weight: 850;
}

.wand-canvas-wrap {
  min-width: 0;
  min-height: 0;
  overflow: auto;
  padding: 24px;
  background-color: #d9d9d9;
  background-image:
    linear-gradient(45deg, #c3c3c3 25%, transparent 25%),
    linear-gradient(-45deg, #c3c3c3 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #c3c3c3 75%),
    linear-gradient(-45deg, transparent 75%, #c3c3c3 75%);
  background-position: 0 0, 0 12px, 12px -12px, -12px 0;
  background-size: 24px 24px;
}

.wand-canvas-wrap canvas {
  display: block;
  max-width: 100%;
  height: auto;
  margin: 0 auto;
  border: 1px solid #777;
  cursor: crosshair;
  box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
}

.wand-tool-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 10px;
}

.wand-tool-row button {
  min-height: 34px;
  margin: 0;
}

.wand-tool-row button.active {
  color: #fff !important;
  background: #2d2119 !important;
  box-shadow: 0 0 0 3px rgba(139, 104, 72, 0.18);
}

.shortcut-help {
  margin-top: 12px;
  padding: 10px;
  border: 1px solid #e4d2ae;
  border-radius: 9px;
  color: #66513e;
  background: #fff8df;
  font-size: 10px;
  line-height: 1.55;
}

@media (max-width: 1050px) {
  .workspace {
    grid-template-columns: 220px minmax(360px, 1fr);
  }

  .right-sidebar {
    display: none;
  }
}

@media (max-width: 760px) {
  .builder-app {
    overflow: auto;
  }

  .workspace {
    min-height: 900px;
    grid-template-columns: 1fr;
  }

  .left-sidebar,
  .right-sidebar {
    display: block;
  }

  .topbar-summary {
    display: none;
  }

  .wand-body {
    grid-template-columns: 1fr;
  }

  .wand-controls {
    max-height: 220px;
    border-right: 0;
    border-bottom: 1px solid #e4d2ae;
  }
}


/* ============================================================
   MAIN-SCREEN PHOTOSHOP TOOLBAR + INLINE ARTWORK EDITOR
   ============================================================ */

.main-screen-editor {
  min-height: 0;
}

.main-screen-workspace {
  position: relative;
  min-height: 0;
  display: grid;
  grid-template-columns: 66px minmax(0, 1fr);
  overflow: hidden;
}

.photoshop-main-toolbar {
  position: sticky;
  top: 12px;
  align-self: start;
  z-index: 40;
  min-height: 0;
  overflow-y: auto;
  padding: 7px 5px;
  border-right: 1px solid #111;
  background: linear-gradient(180deg, #343434 0%, #252525 100%);
  box-shadow: inset -1px 0 rgba(255, 255, 255, 0.05);
}

.screen-tool {
  width: 100%;
  min-height: 54px;
  display: grid;
  place-items: center;
  gap: 2px;
  margin: 0 0 5px;
  padding: 5px 2px;
  border: 1px solid transparent;
  border-radius: 7px;
  color: #e9e9e9;
  background: transparent;
  font-size: 10px;
  transition: 0.12s ease;
}

.screen-tool:hover:not(:disabled) {
  border-color: #5b5b5b;
  background: #414141;
}

.screen-tool.active {
  color: white;
  border-color: #8e8e8e;
  background: #555;
  box-shadow:
    inset 0 0 0 1px #202020,
    0 0 0 1px rgba(255,255,255,.08);
}

.screen-tool:disabled {
  opacity: 0.28;
}

.screen-tool-icon {
  min-width: 26px;
  height: 26px;
  display: grid;
  place-items: center;
  border-radius: 5px;
  font-size: 15px;
  font-weight: 950;
  line-height: 1;
}

.screen-tool small {
  font-size: 8px;
  font-weight: 750;
  line-height: 1.05;
}

.screen-tool.ai-tool .screen-tool-icon {
  font-size: 10px;
  color: #18261e;
  background: #75d49a;
}

.screen-tool-separator {
  height: 1px;
  margin: 8px 5px;
  background: #545454;
}

.main-screen-canvas-area {
  position: relative;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  position: relative;
  background: #d0d0d0;
}

.main-screen-canvas-area > .canvas-scroll {
  width: 100%;
  height: 100%;
}

.editing-mode-label {
  min-width: 130px !important;
  color: #563a27 !important;
  text-align: left !important;
  text-transform: capitalize;
}

.inline-artwork-editor {
  width: 100%;
  height: 100%;
  min-height: 0;
  display: grid;
  grid-template-rows: 58px minmax(0, 1fr);
  overflow: hidden;
  background: #292929;
}

.inline-editor-header {
  border-radius: 0;
  border: 0;
  border-bottom: 1px solid #1b1b1b;
  background: linear-gradient(180deg, #444 0%, #333 100%);
}

.inline-editor-header strong {
  color: #fff;
}

.inline-editor-header span {
  color: #d7d7d7;
}

.editor-back-button {
  min-height: 34px;
  margin: 0;
  padding: 6px 12px;
  border: 1px solid #666;
  border-radius: 8px;
  color: #fff;
  background: #4b4b4b;
  font-size: 11px;
  font-weight: 850;
}

.editor-back-button:hover {
  background: #5b5b5b;
}

.inline-artwork-editor .wand-body {
  min-height: 0;
  display: block;
  overflow: hidden;
}

.inline-artwork-editor .wand-main {
  width: 100%;
  height: 100%;
  min-height: 0;
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  overflow: hidden;
}

.inline-artwork-editor .wand-controls {
  min-height: 0;
  overflow: auto;
  padding: 13px;
  border-right: 1px solid #252525;
  background: #f9f4e8;
}

.inline-artwork-editor .wand-canvas-stage {
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  background: #999;
}

.inline-artwork-editor .wand-canvas-wrap {
  position: relative;
  width: 100%;
  height: 100%;
  min-width: 0;
  min-height: 0;
  overflow: auto;
  padding: 28px;
  background-color: #b8b8b8;
  background-image:
    linear-gradient(45deg, #9f9f9f 25%, transparent 25%),
    linear-gradient(-45deg, #9f9f9f 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #9f9f9f 75%),
    linear-gradient(-45deg, transparent 75%, #9f9f9f 75%);
  background-position: 0 0, 0 12px, 12px -12px, -12px 0;
  background-size: 24px 24px;
  overscroll-behavior: contain;
}

.inline-artwork-editor .wand-canvas-inner {
  position: relative;
  display: block;
  flex: 0 0 auto;
  border: 1px solid #555;
  background-color: transparent;
  background-image:
    linear-gradient(45deg, #e1e1e1 25%, transparent 25%),
    linear-gradient(-45deg, #e1e1e1 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #e1e1e1 75%),
    linear-gradient(-45deg, transparent 75%, #e1e1e1 75%);
  background-position: 0 0, 0 10px, 10px -10px, -10px 0;
  background-size: 20px 20px;
  box-shadow: 0 10px 34px rgba(0,0,0,.33);
  transform-origin: top left;
}

.inline-artwork-editor .editor-canvas,
.inline-artwork-editor .editor-overlay,
.inline-artwork-editor .selection-svg {
  position: absolute;
  inset: 0;
  display: block;
  width: 100%;
  height: 100%;
  max-width: none;
  margin: 0;
  border: 0;
}

.inline-artwork-editor .editor-canvas {
  z-index: 1;
  cursor: none;
  box-shadow: none;
}

.inline-artwork-editor .editor-overlay {
  z-index: 2;
  pointer-events: none;
  cursor: none;
  box-shadow: none;
}

.inline-artwork-editor .selection-svg {
  z-index: 3;
  overflow: visible;
  pointer-events: none;
}

.inline-artwork-editor .selection-path {
  fill: rgba(40, 120, 255, 0.06);
  stroke: #fff;
  stroke-width: 1.4;
  stroke-dasharray: 7 5;
  vector-effect: non-scaling-stroke;
  filter:

/* ============================================================
   NEW SHEET DIALOG + PHOTOSHOP-LIKE LAYER NUMBERING
   ============================================================ */
.topbar-file-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

  width: auto;
  min-width: 92px;
  padding: 8px 12px;

  background: rgba(58, 39, 25, 0.38);
  font-weight: 850;
}

.topbar-file-actions button:hover:not(:disabled) {
  background: rgba(58, 39, 25, 0.62);
}

.layer-group-topline {
  display: grid;
  grid-template-columns: 30px minmax(0, 1fr);
  align-items: stretch;
}

.layer-group-toggle {
  width: 30px;
  min-width: 30px;
  margin: 0;
  padding: 0;

.layer-group-topline .layer-group-header {
  min-width: 0;
}

.layer-group-header span,
.layer-row span {
  min-width: 0;

  text-overflow: ellipsis;
  white-space: nowrap;
}

.new-sheet-overlay {
  position: fixed;
  inset: 0;
  z-index: 5000;
  display: grid;
  place-items: center;
  padding: 24px;
  background: rgba(19, 22, 28, 0.72);
  backdrop-filter: blur(8px);
}

.new-sheet-dialog {
  width: min(680px, calc(100vw - 32px));
  max-height: calc(100vh - 32px);
  overflow: auto;
  border: 1px solid #5d626b;
  border-radius: 18px;
  color: #f2f2f2;
  background: linear-gradient(180deg, #3d4148 0%, #292c31 100%);

}

.new-sheet-dialog-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 22px 24px 16px;
  border-bottom: 1px solid #53575e;
}

.new-sheet-dialog-header span {
  color: #bfc4cc;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.16em;
}

.new-sheet-dialog-header h2 {
  margin: 4px 0 0;
  color: #fff;
  font-size: 24px;
}

.new-sheet-dialog-header button {
  width: 34px;
  height: 34px;
  min-width: 34px;
  margin: 0;
  padding: 0;
  border: 1px solid #686d75;
  border-radius: 8px;
  color: #fff;
  background: #4a4e55;
  font-size: 22px;
}

.new-sheet-preview {
  min-height: 190px;
  display: grid;
  place-items: center;
  gap: 10px;
  padding: 24px;
  background:
    linear-gradient(45deg, #26292e 25%, transparent 25%),
    linear-gradient(-45deg, #26292e 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #26292e 75%),
    linear-gradient(-45deg, transparent 75%, #26292e 75%),
    #31343a;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0;
  background-size: 20px 20px;
}

.new-sheet-preview-paper {
  width: min(230px, 65vw);
  max-height: 150px;
  border: 1px solid #d4d4d4;
  background: #fff;
  box-shadow: 0 12px 28px rgba(0,0,0,0.35);
}

.new-sheet-preview > span {
  color: #c9cdd3;
  font-size: 11px;
  font-weight: 750;
}

.new-sheet-fields {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  padding: 20px 24px;
}

  display: grid;
  gap: 7px;
}

.new-sheet-field.full {
  grid-column: 1 / -1;
}

.new-sheet-field > span {
  color: #d8dbe0;
  font-size: 12px;
  font-weight: 800;
}

}

.new-sheet-field input:focus {

}

.new-sheet-dialog-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px 24px 22px;
  border-top: 1px solid #53575e;
}

.new-sheet-dialog-actions button {
  width: auto;

  margin: 0;
  padding: 11px 16px;
  border-radius: 9px;

}

  border: 1px solid #6a6f77;

  background: #44484f;
}

  border: 1px solid #4f8ddf;

@media (max-width: 800px) {

    grid-template-columns: 1fr;
  }

    grid-column: auto;

<body>
    <div id="root">
        <div style="height:100%;display:grid;place-items:center;font-family:Arial,sans-serif;color:#6f5138;background:#f4edc5;">
            Loading Niron Smart Print Builder...
        </div>
    </div>

    <script>
        window.NIRON_SHEET_ID = {{ sheet.id }};

        window.NIRON_API = {
            createSheet: "{% url 'create_sheet' %}",
            csrfToken: "{{ csrf_token }}",
            detail: "{% url 'sheet_detail_api' sheet.id %}",
            upload: "{% url 'upload_asset_api' sheet.id %}",
            autoPack: "{% url 'auto_pack_sheet_api' sheet.id %}",
            exportPng: "{% url 'export_sheet_png_api' sheet.id %}",
            createItem: "{% url 'create_item_api' sheet.id %}",

            updateItem: function (id) {
                return "/api/items/" + id + "/update/";
            },

            smartDuplicate: function (id) {
                return "/api/items/" + id + "/smart-duplicate/";
            },

            cloneItem: function (id) {
                return "/api/items/" + id + "/clone/";
            },

            deleteItem: function (id) {
                return "/api/items/" + id + "/delete/";
            },

            rotateItem: function (id) {
                return "/api/items/" + id + "/rotate/";
            },

            removeBackground: function (id) {
                return "/api/items/" + id + "/remove-background/";
            },

            magicWand: function (id) {
                return "/api/items/" + id + "/magic-wand/";
            },

            cropItem: function (id) {
                return "/api/items/" + id + "/crop/";
            },

            upscaleItem: function (id) {
                return "/api/items/" + id + "/upscale/";
            }
        };
    </script>

    <script
        type="module"
        src="{% static 'niron_builder/builder.js' %}?v={{ cache_bust }}"
    ></script>
</body>
</html>
