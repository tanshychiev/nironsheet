<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Sheet - Niron</title>
    <style>
        :root {
            --niron-bg: #F4EDC5;
            --niron-primary: #9E7957;
            --niron-primary-dark: #896746;
            --niron-card: #fffaf0;
            --niron-border: #e2d2ad;
            --niron-text-soft: #7f684f;
            --niron-shadow: 0 18px 40px rgba(158, 121, 87, 0.12);
            --radius: 22px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #f7f0cd 0%, #f4edc5 100%);
            color: var(--niron-primary);
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 16px;
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: rgba(255, 250, 240, 0.9);
            border: 1px solid var(--niron-border);
            border-radius: 28px;
            box-shadow: var(--niron-shadow);
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin: 0 0 10px;
            font-size: 38px;
        }

        .sub {
            text-align: center;
            color: var(--niron-text-soft);
            margin-bottom: 28px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .field {
            margin-bottom: 18px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--niron-border);
            border-radius: 14px;
            background: #fffdf7;
            outline: none;
            font-size: 16px;
        }

        input:focus {
            border-color: var(--niron-primary);
        }

        .help {
            font-size: 13px;
            color: var(--niron-text-soft);
            margin-top: 6px;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin-top: 8px;
        }

        .btn, .btn-light {
            display: inline-block;
            padding: 14px 22px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        .btn {
            background: var(--niron-primary);
            color: #fff;
        }

        .btn:hover {
            background: var(--niron-primary-dark);
        }

        .btn-light {
            background: #fff;
            color: var(--niron-primary);
            border: 1px solid var(--niron-border);
        }

        @media (max-width: 700px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Create New Sheet</h1>
            <div class="sub">All sizes below are in centimeters (cm).</div>

            <form method="post">
                {% csrf_token %}

                <div class="grid">
                    <div class="field full">
                        <label>Sheet Name</label>
                        <input type="text" name="name" placeholder="Example: DTF Sheet 1" required>
                    </div>

                    <div class="field">
                        <label>Width (cm)</label>
                        <input type="number" step="0.01" name="width_cm" placeholder="58" required>
                    </div>

                    <div class="field">
                        <label>Height (cm)</label>
                        <input type="number" step="0.01" name="height_cm" placeholder="100" required>
                    </div>

                    <div class="field">
                        <label>Spacing Between Items (cm)</label>
                        <input type="number" step="0.01" name="spacing_cm" value="0.20" required>
                    </div>

                    <div class="field">
                        <label>Margin (cm)</label>
                        <input type="number" step="0.01" name="margin_cm" value="0.20" required>
                    </div>
                </div>

                <div class="actions">
                    <a href="{% url 'home' %}" class="btn-light">Back</a>
                    <button type="submit" class="btn">Continue to Builder</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
